{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Sign Up</h1>
    <p class="kicker">Create your helpdesk account.</p>

    {% if error %}
    <p style="color: #ff8a8a; font-weight: 700;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/signup" class="ticket-form">
        <label>Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Create Account</button>
    </form>
</div>
{% endblock %}

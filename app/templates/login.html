{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Login</h1>
    <p class="kicker">Sign in to access the helpdesk platform.</p>

    {% if error %}
    <p style="color: #ff8a8a; font-weight: 700;">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="ticket-form">
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}

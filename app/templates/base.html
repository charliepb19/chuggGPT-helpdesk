<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChuggGPT AI Helpdesk</title>

    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="brand-wrap">
                <div class="brand">ChuggGPT AI Helpdesk</div>
                <div class="brand-subtitle">AI-Native IT Support Intelligence</div>
            </a>

            <nav class="nav-links">
                {% if request.session.get("user_id") %}
                    <a href="/submit-ticket">Submit Ticket</a>
                    <a href="/my-tickets">My Tickets</a>

                    {% if request.session.get("user_role") == "admin" %}
                        <a href="/dashboard">Dashboard</a>
                    {% endif %}

                    <a href="/logout">Logout</a>
                {% else %}
                    <a href="/login">Login</a>
                    <a href="/signup">Sign Up</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
